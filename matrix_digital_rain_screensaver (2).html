<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Digital Rain • Tela de Descanso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            overflow: hidden;
            font-family: 'Courier New', 'Consolas', monospace;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        .overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #00FF41;
            font-size: 13px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #00FF41;
            opacity: 0.7;
            pointer-events: none;
            z-index: 10;
            transition: opacity 1.5s ease;
        }
        .overlay.hidden {
            opacity: 0;
        }
        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00FF41;
            font-size: 11px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00FF41;
            opacity: 0.5;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="title">THE MATRIX • 1999</div>
    <div class="overlay" id="overlay">VERDE FLUORESCENTE • CÓDIGO BINÁRIO CAINDO • PRESSIONE F11 PARA TELA CHEIA</div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d', { alpha: true });

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const fontSize = 16;
        let columns = Math.floor(width / fontSize);
        let drops = [];
        let speeds = [];

        // Initialize drops with random positions and slight speed variation
        function initDrops() {
            drops = [];
            speeds = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * (height / fontSize);
                speeds[i] = 0.8 + Math.random() * 0.6; // slight speed variation
            }
        }

        initDrops();

        const binaryChars = '01';

        function draw() {
            // Semi-transparent black for beautiful trailing effect (the longer the trail, the more "Matrix" it feels)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.09)';
            ctx.fillRect(0, 0, width, height);

            // Matrix green - bright fluorescent
            ctx.fillStyle = '#00FF41';
            ctx.font = `${fontSize}px 'Courier New', 'Consolas', monospace`;

            for (let i = 0; i < drops.length; i++) {
                // Pick random binary character
                const char = binaryChars[Math.floor(Math.random() * binaryChars.length)];
                
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                // Draw the glowing character
                ctx.fillText(char, x, y);

                // Move the drop down (with speed variation)
                drops[i] += speeds[i];

                // When the drop goes off screen, randomly reset it to the top
                if (drops[i] * fontSize > height) {
                    if (Math.random() > 0.96) {  // controls how often new drops appear
                        drops[i] = 0;
                    }
                }
            }
        }

        let lastTime = 0;
        const targetFPS = 30; // smooth but not too heavy on CPU
        const frameInterval = 1000 / targetFPS;

        function animate(currentTime = 0) {
            if (currentTime - lastTime >= frameInterval) {
                draw();
                lastTime = currentTime;
            }
            requestAnimationFrame(animate);
        }

        // Start the animation
        animate();

        // Handle window resize smoothly
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                columns = Math.floor(width / fontSize);
                initDrops();
            }, 150);
        });

        // Auto-hide the instructions after some seconds (like a real screensaver)
        setTimeout(() => {
            const overlay = document.getElementById('overlay');
            if (overlay) {
                overlay.classList.add('hidden');
            }
        }, 6500);

        // Easter egg: click anywhere to make it rain harder for a moment
        let clickBoost = false;
        canvas.addEventListener('click', () => {
            if (clickBoost) return;
            clickBoost = true;
            
            const originalSpeeds = [...speeds];
            for (let i = 0; i < speeds.length; i++) {
                speeds[i] = speeds[i] * 2.2;
            }
            
            setTimeout(() => {
                speeds = originalSpeeds;
                clickBoost = false;
            }, 1200);
        });

        // Keyboard hint
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                // In fullscreen, ESC usually exits fullscreen in browser
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
            }
        });

        // Make it feel more premium - subtle glow on characters
        // (the canvas context already renders it nicely)
    </script>
</body>
</html>
